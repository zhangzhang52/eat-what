<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>今天吃什么</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 80px;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
        }
        #result {
            margin-top: 30px;
            font-size: 24px;
            color: #e91e63;
        }
    </style>
</head>
<body>

    <h1>🍽️ 今天吃什么？</h1>

    <button onclick="draw()">开始抽签</button>

    <div id="result"></div>

    <script>
    function draw() {
        // 1. 显示加载中（可选，体验更好）
        document.getElementById("result").innerText = "抽签中...";

        // 2. 发起请求
        fetch('http://localhost:5103/api/lottery/draw')
            .then(response => {
                // 检查服务器是否成功响应
                if (!response.ok) {
                    throw new Error("服务器出错");
                }
                return response.json(); // 解析 JSON 数据
            })
            .then(data => {
                // 3. 这里打印一下 data，看看控制台能不能收到
                console.log(data); 
                
                // 4. 显示结果
                // 注意：后端返回的属性名必须和这里对应（根据你之前的代码是 prizeName）
                if (data.prizeName) {
                    document.getElementById("result").innerText = "🎉 今天吃：" + data.prizeName;
                } else {
                    document.getElementById("result").innerText = "❌ 数据格式不对";
                }
            })
            .catch(error => {
                // 5. 如果出错，显示错误信息
                console.error("出错了:", error);
                document.getElementById("result").innerText = "❌ 请求失败，请检查后端是否运行";
            });
    }
</script>

</body>
</html>
